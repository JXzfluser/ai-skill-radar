<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="radar-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  
  <!-- 雷达背景 -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#radar-gradient)" stroke-width="2"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="url(#radar-gradient)" stroke-width="1"/>
  <circle cx="32" cy="32" r="12" fill="none" stroke="url(#radar-gradient)" stroke-width="0.5"/>
  
  <!-- 雷达扫描线 -->
  <path d="M32,32 L32,4 C32,4 48,4 48,20 C48,36 32,52 32,52" 
        fill="none" stroke="url(#gradient)" stroke-width="1" opacity="0.6"/>
  
  <!-- AI芯片核心 -->
  <rect x="24" y="24" width="16" height="16" rx="4" fill="url(#gradient)"/>
  
  <!-- 芯片网格 -->
  <path d="M24,28 L40,28 M24,32 L40,32 M24,36 L40,36 
           M28,24 L28,40 M32,24 L32,40 M36,24 L36,40" 
        stroke="white" stroke-width="1" stroke-opacity="0.3"/>
  
  <!-- AI字母 -->
  <text x="32" y="37" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="10">AI</text>
</svg>